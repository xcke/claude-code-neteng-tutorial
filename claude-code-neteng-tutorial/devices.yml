---
# Network device inventory — 4 devices across 2 sites
# Used by generate_configs.py and referenced by Claude Code skills

sites:
  dallas:
    ntp_servers:
      - 10.0.0.1
      - 10.0.0.2
    dns_servers:
      - 10.0.0.10
      - 10.0.0.11
    domain: dal.example.com

  new-york:
    ntp_servers:
      - 10.0.0.1
      - 10.0.0.2
    dns_servers:
      - 10.0.0.10
      - 10.0.0.11
    domain: nyc.example.com

devices:
  - hostname: dal-wan-01
    site: dallas
    role: wan-edge
    platform: ios-xe
    management_ip: 192.168.100.1
    management_vlan: 100
    loopback0: 10.255.1.1/32
    bgp:
      asn: 65001
      router_id: 10.255.1.1
      wan_interface: GigabitEthernet0/0/0
      wan_ip: 203.0.113.2/30
      peer_ip: 203.0.113.1
      peer_asn: 64999
      advertised_prefixes:
        - 10.10.0.0/16
        - 10.255.1.1/32

  - hostname: dal-acc-01
    site: dallas
    role: access-switch
    platform: ios-xe
    management_ip: 192.168.100.2
    management_vlan: 100
    loopback0: 10.255.1.2/32
    vlans:
      - id: 10
        name: ENGINEERING
        subnet: 10.10.10.0/24
      - id: 20
        name: SALES
        subnet: 10.10.20.0/24
      - id: 30
        name: GUEST
        subnet: 10.10.30.0/24

  - hostname: nyc-wan-01
    site: new-york
    role: wan-edge
    platform: ios-xe
    management_ip: 192.168.200.1
    management_vlan: 200
    loopback0: 10.255.2.1/32
    bgp:
      asn: 65002
      router_id: 10.255.2.1
      wan_interface: GigabitEthernet0/0/0
      wan_ip: 198.51.100.2/30
      peer_ip: 198.51.100.1
      peer_asn: 64999
      advertised_prefixes:
        - 10.20.0.0/16
        - 10.255.2.1/32

  - hostname: nyc-acc-01
    site: new-york
    role: access-switch
    platform: ios-xe
    management_ip: 192.168.200.2
    management_vlan: 200
    loopback0: 10.255.2.2/32
    vlans:
      - id: 10
        name: ENGINEERING
        subnet: 10.20.10.0/24
      - id: 20
        name: SALES
        subnet: 10.20.20.0/24
      - id: 40
        name: SERVER
        subnet: 10.20.40.0/24
