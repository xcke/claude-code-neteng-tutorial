! ========================================
! Base configuration: dal-wan-01
! Site: dallas
! Role: wan-edge
! ========================================
!
hostname dal-wan-01
!
service timestamps debug datetime msec localtime
service timestamps log datetime msec localtime
service password-encryption
no ip domain-lookup
ip domain name dal.example.com
!
logging buffered 64000 informational
!
ip ssh version 2
crypto key generate rsa modulus 4096
!
banner motd ^
***********************************************
* AUTHORIZED ACCESS ONLY                      *
* All activity is monitored and recorded.     *
* Disconnect immediately if not authorized.   *
***********************************************
^
!
ntp server 10.0.0.1
ntp server 10.0.0.2
!
ip name-server 10.0.0.10
ip name-server 10.0.0.11
!
interface Loopback0
 description Router-ID / Management
 ip address 10.255.1.1 255.255.255.255
!
interface Vlan100
 description Management
 ip address 192.168.100.1 255.255.255.0
 no shutdown
!
login on-failure log
login on-success log
!
!
router bgp 65001
 bgp router-id 10.255.1.1
 bgp log-neighbor-changes
 neighbor 203.0.113.1 remote-as 64999
 !
 address-family ipv4 unicast
  network 10.10.0.0 mask 255.255.0.0
  network 10.255.1.1 mask 255.255.255.255
  neighbor 203.0.113.1 activate
 exit-address-family
!
end
